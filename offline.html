<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#020617" />
  <title>オフライン | GBC Interview Flashcards</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b, #020617 65%);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      padding: 24px;
      box-sizing: border-box;
    }
    .box {
      max-width: 520px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 18px 60px rgba(15, 23, 42, 0.38);
    }
    h1 { margin-top: 0; font-size: 1.5rem; }
    p { line-height: 1.8; color: #cbd5e1; }
    a {
      display: inline-block;
      margin-top: 12px;
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, #38bdf8, #a78bfa);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>オフラインです</h1>
    <p>このアプリは一度読み込んでいれば、通常はオフラインでも使えます。初回キャッシュがまだ完了していない場合は、オンライン接続時に再度開いてください。</p>
    <a href="./index.html">アプリを開き直す</a>
  </div>
</body>
</html>
